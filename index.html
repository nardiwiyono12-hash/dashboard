<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>

<title>Enterprise Dashboard - UAV Survey</title>

<style>

/* ================= GLOBAL ================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI",Arial,sans-serif;
}

html,
body{
  width:100%;
  height:100dvh;
  overflow:hidden;
  background:#f4f6f9;
  color:#1f2937;
}

/* ================= DESKTOP SIDEBAR ================= */

.sidebar{
  width:260px;
  height:100dvh;
  background:#00838f;
  color:white;
  padding:30px 0;
  position:fixed;
  transition:0.3s;
  overflow:hidden;
  z-index:2000;
}

.sidebar.collapsed{
  width:80px;
}

.toggle-btn{
  position:absolute;
  top:50%;
  right:-12px;
  transform:translateY(-50%);
  background:#00838f;
  color:white;
  width:34px;
  height:70px;
  border-radius:0 10px 10px 0;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:18px;
  z-index:9999;
}

.sidebar.collapsed .toggle-btn{
  transform:translateY(-50%) rotate(180deg);
}

.sidebar h2{
  font-size:22px;
  margin-bottom:40px;
  font-weight:900;
  padding:0 25px;
}

.sidebar.collapsed h2{
  opacity:0;
}

.menu-item{
  padding:16px 25px;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  transition:0.25s;
}

.menu-item:hover{
  background:rgba(255,255,255,0.15);
  padding-left:55px;
}

.menu-item.active{
  background:rgba(0,0,0,0.2);
}

.sidebar.collapsed .menu-item{
  font-size:0;
  text-align:center;
  padding:18px 0;
}

.sidebar.collapsed .menu-item::after{
  content:"●";
  font-size:18px;
}

/* ================= MAIN ================= */

.main{
  margin-left:260px;
  width:calc(100% - 260px);
  height:100dvh;
  transition:0.3s;
  display:flex;
  flex-direction:column;
}

.main.expanded{
  margin-left:80px;
  width:calc(100% - 80px);
}

/* ================= HEADER ================= */

.header{
  background:white;
  height:90px;
  border-bottom:2px solid #e5e7eb;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  flex-shrink:0;
}

.logo-left,
.logo-right{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
}

.logo-left{
  left:20px;
}

.logo-right{
  right:20px;
}

.logo-left img{
  height:60px;
}

.logo-right img{
  height:45px;
}

.header h1{
  font-size:28px;
  color:#00838f;
  text-align:center;
}

/* ================= MOBILE MENU ================= */

.mobile-top-menu{
  display:none;
}

/* ================= FMDS SUB MENU ================= */

.fmds-submenu{
  display:flex;
  gap:15px;
  padding:12px 20px;
  background:#ead6aa;
  border-bottom:2px solid #ddd;
}

.fmds-tab{
  flex:1;
  background:#00838f;
  color:white;
  text-align:center;
  padding:14px;
  font-weight:700;
  border-radius:8px;
  cursor:pointer;
  transition:.25s;
}

.fmds-tab:hover{
  background:#006f78;
}

.fmds-tab.active{
  background:#f28c00;
}

.fmds-submenu.hide{
  display:none;
}

@media(max-width:768px){

  .fmds-submenu{
    gap:8px;
    padding:8px;
  }

  .fmds-tab{
    font-size:12px;
    padding:10px 8px;
  }

}

/* ================= CONTENT ================= */

.content{
  flex:1;
  min-height:0;
  position:relative;
  overflow:hidden;
}

iframe{
  width:100%;
  height:100%;
  border:none;
  background:white;
}

/* ================= SPINNER ================= */

.spinner{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  border:5px solid #ddd;
  border-top:5px solid #00838f;
  border-radius:50%;
  width:45px;
  height:45px;
  animation:spin 1s linear infinite;
  display:none;
  z-index:999;
}

@keyframes spin{
  100%{
    transform:translate(-50%,-50%) rotate(360deg);
  }
}

/* ================= MOBILE ================= */

@media (max-width:768px){

  html,
  body{
    height:100dvh;
    overflow:hidden;
  }

  /* hide desktop sidebar */
  .sidebar{
    display:none;
  }

  .main{
    margin-left:0;
    width:100%;
    height:100dvh;
    display:flex;
    flex-direction:column;
  }

  /* HEADER */
  .header{
    height:65px;
    padding:0 10px;
    flex-shrink:0;
  }

  .header h1{
    font-size:14px;
    max-width:50%;
    line-height:1.2;
  }

  .logo-left{
    left:10px;
  }

  .logo-right{
    right:10px;
  }

  .logo-left img{
    height:30px;
  }

  .logo-right img{
    height:24px;
  }

  /* MOBILE MENU */
  .mobile-top-menu{
    display:flex;
    align-items:center;
    overflow-x:auto;
    white-space:nowrap;
    gap:8px;
    padding:10px;
    background:white;
    border-bottom:1px solid #ddd;
    scrollbar-width:none;
    flex-shrink:0;
  }

  .mobile-top-menu::-webkit-scrollbar{
    display:none;
  }

  .mobile-menu-item{
    padding:10px 16px;
    background:#f3f4f6;
    border-radius:999px;
    font-size:12px;
    font-weight:700;
    flex-shrink:0;
    cursor:pointer;
    transition:0.25s;
  }

  .mobile-menu-item.active{
    background:#00838f;
    color:white;
  }

  /* CONTENT */
  .content{
    flex:1;
    min-height:0;
    overflow:hidden;
  }

  iframe{
    width:100%;
    height:100%;
    border:none;
  }

}

/* ================= BACKDROP ================= */

.backdrop{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  display:none;
  z-index:1500;
}

.backdrop.active{
  display:block;
}

</style>
</head>

<body>

<!-- ================= SIDEBAR ================= -->

<div class="sidebar" id="sidebar">

  <div class="toggle-btn" onclick="toggleSidebar()">❮</div>

  <h2>DASHBOARD</h2>

  <div class="menu-item active"
  onclick="loadReport('FMDS', event)">
  FMDS
  </div>

  <div class="menu-item"
  onclick="loadReport('MANPOWER', event)">
  MANPOWER
  </div>

  <div class="menu-item"
  onclick="loadReport('EQUIPMENT', event)">
  EQUIPMENT
  </div>

  <div class="menu-item"
  onclick="loadReport('LIGHT_VEHICLE', event)">
  LIGHT VEHICLE
  </div>

  <div class="menu-item"
  onclick="loadReport('WEEKLY_ACTIVITY', event)">
  WEEKLY ACTIVITY
  </div>

  <div class="menu-item"
  onclick="loadReport('MONTHLY_ACTIVITY', event)">
  MONTHLY ACTIVITY
  </div>

</div>

<!-- ================= MAIN ================= -->

<div class="main" id="mainContent">

  <!-- HEADER -->
  <div class="header">

    <div class="logo-left">
      <img src="logo.png">
    </div>

    <h1>UAV SURVEY SERVICE</h1>

    <div class="logo-right">
      <img src="logo_vale.png">
    </div>

  </div>

<!-- FMDS SUB MENU -->
<div class="fmds-submenu" id="fmdsSubmenu">

  <div class="fmds-tab active"
       onclick="loadFMDS('PEOPLE_HEALTH',event)">
    PEOPLE & HEALTH
  </div>

  <div class="fmds-tab"
       onclick="loadFMDS('SAFETY_REPORT',event)">
    SAFETY REPORT
  </div>

  <div class="fmds-tab"
       onclick="loadFMDS('ACTIVITY_ISSUE',event)">
    ACTIVITY & ISSUE
  </div>

</div>

  <!-- MOBILE MENU -->
  <div class="mobile-top-menu">

    <div class="mobile-menu-item active"
    onclick="loadReport('FMDS', event)">
    FMDS
    </div>

    <div class="mobile-menu-item"
    onclick="loadReport('MANPOWER', event)">
    MANPOWER
    </div>

    <div class="mobile-menu-item"
    onclick="loadReport('EQUIPMENT', event)">
    EQUIPMENT
    </div>

    <div class="mobile-menu-item"
    onclick="loadReport('LIGHT_VEHICLE', event)">
    LIGHT VEHICLE
    </div>

    <div class="mobile-menu-item"
    onclick="loadReport('WEEKLY_ACTIVITY', event)">
    WEEKLY ACTIVITY
    </div>

    <div class="mobile-menu-item"
    onclick="loadReport('MONTHLY_ACTIVITY', event)">
    MONTHLY ACTIVITY
    </div>

  </div>

  <!-- CONTENT -->
  <div class="content">

    <div class="spinner" id="spinner"></div>

    <iframe id="reportFrame"></iframe>

  </div>

</div>

<script>

/* ================= REPORTS ================= */

const desktopReports = {
  FMDS: "https://datastudio.google.com/embed/reporting/a52e122c-a264-428e-bd04-e961fe178c90/page/p_nqbrbssp4d?rm=minimal",
  MANPOWER: "https://datastudio.google.com/embed/reporting/a52e122c-a264-428e-bd04-e961fe178c90/page/p_qaljahgf2d?rm=minimal",
  EQUIPMENT: "https://datastudio.google.com/embed/reporting/a52e122c-a264-428e-bd04-e961fe178c90/page/T8WsF?rm=minimal",
  LIGHT_VEHICLE: "https://datastudio.google.com/embed/reporting/a52e122c-a264-428e-bd04-e961fe178c90/page/p_g8y1zsg51d?rm=minimal",
  WEEKLY_ACTIVITY: "https://datastudio.google.com/embed/reporting/a52e122c-a264-428e-bd04-e961fe178c90/page/p_crselin31d?rm=minimal",
  MONTHLY_ACTIVITY: "https://datastudio.google.com/embed/reporting/a52e122c-a264-428e-bd04-e961fe178c90/page/p_kpjruo821d?rm=minimal"

};

const mobileReports = {
  FMDS: "https://datastudio.google.com/embed/reporting/1c7ad7e4-1951-42c6-8437-8de21fb054e6/page/p_cc2qalhs2d?rm=minimal",
  MANPOWER: "https://datastudio.google.com/embed/reporting/1c7ad7e4-1951-42c6-8437-8de21fb054e6/page/p_qaljahgf2d?rm=minimal",
  EQUIPMENT: "https://datastudio.google.com/embed/reporting/1c7ad7e4-1951-42c6-8437-8de21fb054e6/page/T8WsF?rm=minimal",
  LIGHT_VEHICLE: "https://datastudio.google.com/embed/reporting/1c7ad7e4-1951-42c6-8437-8de21fb054e6/page/p_g8y1zsg51d?rm=minimal",
  WEEKLY_ACTIVITY: "https://datastudio.google.com/embed/reporting/1c7ad7e4-1951-42c6-8437-8de21fb054e6/page/p_sas31h1v3d?rm=minimal",
  MONTHLY_ACTIVITY: "https://datastudio.google.com/embed/reporting/1c7ad7e4-1951-42c6-8437-8de21fb054e6/page/p_kpjruo821d?rm=minimal"
};

const fmdsReports = {

  PEOPLE_HEALTH:
  "https://datastudio.google.com/embed/reporting/a52e122c-a264-428e-bd04-e961fe178c90/page/p_nqbrbssp4d?rm=minimal",

  SAFETY_REPORT:
  "https://datastudio.google.com/embed/reporting/a52e122c-a264-428e-bd04-e961fe178c90/page/p_bs1dvntp4d?rm=minimal",

  ACTIVITY_ISSUE:
  "https://datastudio.google.com/embed/reporting/a52e122c-a264-428e-bd04-e961fe178c90/page/p_zkcx1otp4d?rm=minimal"

};

/* ================= SYSTEM ================= */

let currentMenu = "FMDS";

function isMobile(){
  return window.innerWidth <= 768;
}

function getCurrentReportURL(menu){

  return isMobile()
    ? mobileReports[menu]
    : desktopReports[menu];

}

/* INIT */
window.addEventListener("load", function(){

  loadReport("FMDS");
  loadFMDS("PEOPLE_HEALTH");

});

/* LOAD REPORT */
function loadReport(menu, event=null){

  currentMenu = menu;

  if(menu==="FMDS"){

  document
    .getElementById("fmdsSubmenu")
    .classList.remove("hide");

loadFMDS("PEOPLE_HEALTH");

}
else{

  document
    .getElementById("fmdsSubmenu")
    .classList.add("hide");

}

  document.getElementById("spinner").style.display = "block";

  document.getElementById("reportFrame").src =
    getCurrentReportURL(menu);

  document
    .querySelectorAll('.menu-item')
    .forEach(i => i.classList.remove('active'));

  document
    .querySelectorAll('.mobile-menu-item')
    .forEach(i => i.classList.remove('active'));

  if(event){
    event.target.classList.add('active');
  }

}

/* SPINNER */
document.getElementById("reportFrame").onload = function(){

  document.getElementById("spinner").style.display = "none";

};

function loadFMDS(page,event=null){

  document.getElementById("spinner").style.display = "block";

  document.getElementById("reportFrame").src =
      fmdsReports[page];

  document
    .querySelectorAll(".fmds-tab")
    .forEach(i=>i.classList.remove("active"));

  if(event){
    event.target.classList.add("active");
  }

}

/* DESKTOP SIDEBAR */
function toggleSidebar(){

  if(isMobile()) return;

  document
    .getElementById("sidebar")
    .classList.toggle("collapsed");

  document
    .getElementById("mainContent")
    .classList.toggle("expanded");

}

/* DEVICE SWITCH */
window.addEventListener("resize", function(){

  const newURL = getCurrentReportURL(currentMenu);

  if(document.getElementById("reportFrame").src !== newURL){

    document.getElementById("reportFrame").src = newURL;

  }

});

</script>

</body>
</html>
